<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Dashboard Zauri Bot</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        // Configuración de Firebase
        const firebaseConfig = {
            apiKey: 'AIzaSyCFYTRogH99upryQPYb5AcK5mUmsQyjULI',
            authDomain: 'zauri-dashboard.firebaseapp.com',
            projectId: 'zauri-dashboard',
            storageBucket: 'zauri-dashboard.firebasestorage.app',
            messagingSenderId: '889952016491',
            appId: '1:889952016491:web:3a07d588a12fab3169b92e'
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Función para guardar configuración en Firebase
        window.finalSave = async function() {
            const config = {
                economia: document.getElementById('toggle-economia').checked,
                tickets: document.getElementById('toggle-tickets').checked,
                welcomeMessage: document.getElementById('welcome-message').value,
                verificationRole: document.getElementById('verification-role').value
            };

            try {
                await set(ref(db, 'bot/config'), config);
                alert('✅ Configuración guardada exitosamente en Firebase.');
                console.log('Configuración guardada:', config);
            } catch (error) {
                alert('❌ Error al guardar la configuración: ' + error.message);
                console.error('Error saving config:', error);
            }
        };
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
        }
        .toggle-switch {
            appearance: none;
            width: 50px;
            height: 28px;
            background-color: #3f3f46;
            border-radius: 34px;
            cursor: pointer;
            position: relative;
            transition: background-color 0.3s;
            border: none;
        }
        .toggle-switch:checked { background-color: #5865f2; }
        .toggle-switch::before {
            content: '';
            position: absolute;
            width: 24px;
            height: 24px;
            background-color: white;
            border-radius: 50%;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }
        .toggle-switch:checked::before { left: 24px; }
    </style>
</head>
<body class="bg-slate-900 text-white">
    <div class="flex h-screen">
        <aside class="w-64 bg-[#0b0e14] fixed h-full z-10">
            <div class="p-6">
                <h2 class="text-xl font-bold mb-8">Zauri Bot</h2>
                <nav class="space-y-4">
                    <a href="#" onclick="showSection('inicio')" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-white/10 transition-all">
                        <i data-lucide="home" class="w-5 h-5"></i>
                        <span>Inicio</span>
                    </a>
                    <a href="#" onclick="showSection('configuracion')" class="flex items-center space-x-3 p-3 rounded-lg hover:bg-white/10 transition-all">
                        <i data-lucide="sliders" class="w-5 h-5"></i>
                        <span>Configuración</span>
                    </a>
                </nav>
            </div>
        </aside>

        <main class="flex-1 bg-[#0f172a] ml-64 flex flex-col">
            <header class="bg-[#0b0e14] p-4 flex justify-between items-center border-b border-white/10">
                <h1 class="text-2xl font-semibold">Dashboard Zauri Bot</h1>
                <button id="loginBtn" class="bg-[#5865f2] px-4 py-2 rounded-lg font-medium" onclick="handleLogin()">Login</button>
            </header>

            <div id="content" class="p-6 space-y-8 overflow-y-auto flex-1">
                <div id="configuracion-section">
                    <h2 class="text-2xl font-bold mb-6">Configuración del Bot</h2>
                    
                    <section class="mb-8">
                        <div class="glass rounded-lg p-6 space-y-4">
                            <div class="flex items-center justify-between">
                                <span>Economía</span>
                                <input type="checkbox" id="toggle-economia" class="toggle-switch" checked>
                            </div>
                            <div class="flex items-center justify-between">
                                <span>Tickets</span>
                                <input type="checkbox" id="toggle-tickets" class="toggle-switch" checked>
                            </div>
                        </div>
                    </section>

                    <section class="mb-8">
                        <div class="glass rounded-lg p-6 space-y-4">
                            <div>
                                <label class="block text-sm mb-2">Mensaje de Bienvenida</label>
                                <textarea id="welcome-message" class="w-full bg-white/10 border border-white/20 rounded-lg p-3 text-white" rows="4"></textarea>
                            </div>
                            <div>
                                <label class="block text-sm mb-2">ID del Rol de Verificación</label>
                                <input type="text" id="verification-role" class="w-full bg-white/10 border border-white/20 rounded-lg p-3 text-white">
                            </div>
                        </div>
                    </section>

                    <button onclick="finalSave()" class="bg-[#5865f2] px-6 py-3 rounded-lg font-medium flex items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i>
                        Guardar Configuración
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        function showSection(id) {
            // Lógica simple para mostrar/ocultar secciones
            console.log("Cambiando a sección:", id);
        }
    </script>
</body>
</html>
