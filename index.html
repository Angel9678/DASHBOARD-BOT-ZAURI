<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Zauri Bot | Panel de Control</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, set, get } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        const firebaseConfig = {
            apiKey: 'AIzaSyCFYTRogH99upryQPYb5AcK5mUmsQyjULI',
            authDomain: 'zauri-dashboard.firebaseapp.com',
            projectId: 'zauri-dashboard',
            storageBucket: 'zauri-dashboard.firebasestorage.app',
            messagingSenderId: '889952016491',
            appId: '1:889952016491:web:3a07d588a12fab3169b92e'
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        let selectedServerId = null;

        // Función para seleccionar un servidor y cargar sus datos
        window.selectServer = async function(guildId, guildName) {
            selectedServerId = guildId;
            document.getElementById('selected-server-name').innerText = guildName;
            showSection('comandos');
            
            // Intentar cargar configuración existente de este servidor desde Firebase
            const snapshot = await get(ref(db, `servidores/${guildId}/config`));
            if (snapshot.exists()) {
                const data = snapshot.val();
                document.getElementById('toggle-bal').checked = data.bal ?? true;
                document.getElementById('toggle-work').checked = data.work ?? true;
                document.getElementById('toggle-kick').checked = data.kick ?? true;
                document.getElementById('welcome-message').value = data.welcomeMessage || "";
            }
        };

        // Guardar configuración específica del servidor seleccionado
        window.finalSave = async function() {
            if (!selectedServerId) return alert("Por favor, selecciona un servidor primero.");

            const config = {
                bal: document.getElementById('toggle-bal').checked,
                work: document.getElementById('toggle-work').checked,
                kick: document.getElementById('toggle-kick').checked,
                welcomeMessage: document.getElementById('welcome-message').value,
                updatedAt: new Date().getTime()
            };

            try {
                await set(ref(db, `servidores/${selectedServerId}/config`), config);
                alert(`✅ Configuración guardada para el servidor ${selectedServerId}`);
            } catch (e) { alert('❌ Error: ' + e.message); }
        };
    </script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0b0e14; color: white; }
        .glass { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        .toggle-switch { appearance: none; width: 40px; height: 20px; background: #2d3748; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle-switch:checked { background: #5865f2; }
        .toggle-switch::before { content: ''; position: absolute; width: 14px; height: 14px; background: white; border-radius: 50%; top: 3px; left: 4px; transition: 0.3s; }
        .toggle-switch:checked::before { left: 22px; }
        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="flex h-screen overflow-hidden">
        <aside class="w-64 bg-[#080a0f] border-r border-white/5 p-6 flex flex-col">
            <h2 class="text-xl font-bold text-[#5865f2] mb-10 flex items-center gap-2"><i data-lucide="layout"></i> Zauri Panel</h2>
            <nav class="space-y-2 flex-1">
                <button onclick="showSection('inicio')" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-all"><i data-lucide="server"></i> Servidores</button>
                <button onclick="showSection('comandos')" id="btn-nav-cmds" class="w-full flex items-center gap-3 p-3 rounded-xl hover:bg-white/5 text-gray-400 hover:text-white transition-all"><i data-lucide="terminal"></i> Comandos</button>
            </nav>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-10">
                <div>
                    <h1 id="section-title" class="text-2xl font-bold">Seleccionar Servidor</h1>
                    <p id="selected-server-display" class="text-xs text-slate-500 mt-1">Editando: <span id="selected-server-name" class="text-[#5865f2]">Ninguno</span></p>
                </div>
                <div id="user-profile" class="flex items-center gap-3 glass px-4 py-2 rounded-full hidden">
                    <img id="avatar" class="w-7 h-7 rounded-full border border-white/10">
                    <span id="username" class="text-sm font-medium"></span>
                </div>
                <button id="loginBtn" onclick="handleLogin()" class="bg-[#5865f2] px-6 py-2 rounded-full font-bold text-sm">Login con Discord</button>
            </header>

            <div id="inicio-section" class="grid grid-cols-1 md:grid-cols-3 gap-6">
                </div>

            <div id="comandos-section" class="hidden space-y-6 max-w-4xl">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-6 tracking-tighter">Interruptores de Comandos</h3>
                    
                    <div class="space-y-4">
                        <div class="flex justify-between items-center p-3 bg-white/5 rounded-2xl">
                            <span class="text-sm">Comando <b>/balance</b> (bal)</span>
                            <input type="checkbox" id="toggle-bal" class="toggle-switch" checked>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-white/5 rounded-2xl">
                            <span class="text-sm">Comando <b>/work</b></span>
                            <input type="checkbox" id="toggle-work" class="toggle-switch" checked>
                        </div>
                        <div class="flex justify-between items-center p-3 bg-white/5 rounded-2xl border-t border-white/5 pt-4">
                            <span class="text-sm text-red-400">Comando <b>/kick</b> (Admin)</span>
                            <input type="checkbox" id="toggle-kick" class="toggle-switch" checked>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-sm font-bold text-slate-500 uppercase mb-4">Mensaje de Bienvenida del Servidor</h3>
                    <textarea id="welcome-message" class="w-full bg-black/20 border border-white/10 rounded-2xl p-4 text-sm outline-none focus:border-[#5865f2]" rows="3"></textarea>
                </div>

                <button onclick="finalSave()" class="w-full bg-[#5865f2] py-4 rounded-2xl font-bold shadow-lg shadow-indigo-500/20 active:scale-95 transition">
                    Guardar Cambios en este Servidor
                </button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();

        function showSection(id) {
            document.getElementById('inicio-section').classList.add('hidden');
            document.getElementById('comandos-section').classList.add('hidden');
            document.getElementById(id + '-section').classList.remove('hidden');
            document.getElementById('section-title').innerText = id === 'inicio' ? 'Seleccionar Servidor' : 'Gestión de Comandos';
        }

        const CLIENT_ID = '1496023683385528411';
        const REDIRECT_URI = window.location.origin + window.location.pathname;

        function handleLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=identify+guilds`;
        }

        window.onload = () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get('access_token');

            if (token) {
                // Obtener perfil
                fetch('https://discord.com/api/users/@me', { headers: { Authorization: `Bearer ${token}` }})
                    .then(r => r.json()).then(user => {
                        document.getElementById('user-profile').classList.remove('hidden');
                        document.getElementById('username').innerText = user.username;
                        document.getElementById('avatar').src = `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`;
                        document.getElementById('loginBtn').classList.add('hidden');
                    });

                // Obtener Servidores
                fetch('https://discord.com/api/users/@me/guilds', { headers: { Authorization: `Bearer ${token}` }})
                    .then(r => r.json()).then(guilds => {
                        const container = document.getElementById('inicio-section');
                        // Filtrar servidores donde soy Admin (permiso 0x8)
                        const adminGuilds = guilds.filter(g => (g.permissions & 0x8) === 0x8);
                        
                        container.innerHTML = adminGuilds.map(g => `
                            <div onclick="selectServer('${g.id}', '${g.name}')" class="glass p-6 rounded-3xl flex flex-col items-center gap-4 hover:border-[#5865f2] transition-all cursor-pointer group">
                                <img class="w-16 h-16 rounded-2xl shadow-lg group-hover:scale-110 transition" src="https://cdn.discordapp.com/icons/${g.id}/${g.icon}.png" onerror="this.src='https://ui-avatars.com/api/?name=${g.name}'">
                                <h4 class="font-bold text-center text-sm">${g.name}</h4>
                                <span class="text-[10px] text-[#5865f2] font-bold uppercase tracking-widest">Configurar</span>
                            </div>
                        `).join('');
                    });
            }
        };
    </script>
</body>
</html>
