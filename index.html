<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.6">
    <title>Zauri Bot Dashboard</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js';
        import { getDatabase, ref, set } from 'https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js';

        // Tu configuración de Firebase (La que GitHub detectó, pero es necesaria aquí)
        const firebaseConfig = {
            apiKey: 'AIzaSyCFYTRogH99upryQPYb5AcK5mUmsQyjULI',
            authDomain: 'zauri-dashboard.firebaseapp.com',
            projectId: 'zauri-dashboard',
            storageBucket: 'zauri-dashboard.firebasestorage.app',
            messagingSenderId: '889952016491',
            appId: '1:889952016491:web:3a07d588a12fab3169b92e'
        };

        // Inicializar Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Función global para guardar datos
        window.finalSave = async function() {
            const config = {
                economia: document.getElementById('toggle-economia').checked,
                tickets: document.getElementById('toggle-tickets').checked,
                welcomeMessage: document.getElementById('welcome-message').value,
                verificationRole: document.getElementById('verification-role').value,
                timestamp: new Date().getTime()
            };

            try {
                // Guardamos en la ruta 'bot/config'
                await set(ref(db, 'bot/config'), config);
                alert('✅ ¡Sincronizado con Firebase! Tu bot recibirá los cambios.');
                console.log("Datos enviados:", config);
            } catch (error) {
                alert('❌ Error al guardar: ' + error.message);
                console.error(error);
            }
        };
    </script>

    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

    <style>
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .toggle-switch { appearance: none; width: 44px; height: 22px; background: #1e293b; border-radius: 20px; position: relative; cursor: pointer; transition: 0.3s; }
        .toggle-switch:checked { background: #5865f2; }
        .toggle-switch::before { content: ''; position: absolute; width: 16px; height: 16px; background: white; border-radius: 50%; top: 3px; left: 4px; transition: 0.3s; }
        .toggle-switch:checked::before { left: 24px; }
    </style>
</head>
<body class="bg-[#0b0e14] text-slate-300 font-sans">

    <div class="flex h-screen">
        <aside class="w-64 bg-[#080a0f] border-r border-white/5 p-6 flex flex-col">
            <h2 class="text-xl font-bold text-[#5865f2] mb-10 flex items-center gap-2">
                <i data-lucide="zap"></i> Zauri Bot
            </h2>
            <nav class="space-y-4 flex-1">
                <div class="flex items-center gap-3 p-3 rounded-xl bg-white/5 text-white">
                    <i data-lucide="settings"></i> Configuración
                </div>
            </nav>
            <div class="text-[10px] opacity-40 text-center">v2.5.0 | Developed by angel</div>
        </aside>

        <main class="flex-1 overflow-y-auto p-8">
            <header class="flex justify-between items-center mb-10">
                <h1 class="text-2xl font-bold text-white">Panel de Control</h1>
                <button class="bg-[#5865f2] hover:bg-[#4752c4] text-white px-6 py-2 rounded-full text-sm font-bold transition">
                    Login con Discord
                </button>
            </header>

            <div class="max-w-3xl space-y-6">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-6">Módulos del Sistema</h3>
                    <div class="space-y-4">
                        <div class="flex justify-between items-center">
                            <span class="flex items-center gap-3"><i data-lucide="coins" class="text-yellow-500"></i> Economía Global</span>
                            <input type="checkbox" id="toggle-economia" class="toggle-switch" checked>
                        </div>
                        <div class="flex justify-between items-center pt-4 border-t border-white/5">
                            <span class="flex items-center gap-3"><i data-lucide="ticket" class="text-blue-500"></i> Sistema de Tickets</span>
                            <input type="checkbox" id="toggle-tickets" class="toggle-switch">
                        </div>
                    </div>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-sm font-bold uppercase tracking-widest text-slate-500 mb-6">Personalización</h3>
                    <div class="space-y-6">
                        <div>
                            <label class="block text-xs font-bold mb-2">MENSAJE DE BIENVENIDA</label>
                            <textarea id="welcome-message" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm focus:border-[#5865f2] outline-none transition" rows="3" placeholder="¡Bienvenido {user} a nuestro servidor!"></textarea>
                        </div>
                        <div>
                            <label class="block text-xs font-bold mb-2">ID DEL ROL DE VERIFICACIÓN</label>
                            <input type="text" id="verification-role" class="w-full bg-black/40 border border-white/10 rounded-2xl p-4 text-sm focus:border-[#5865f2] outline-none transition" placeholder="Ej: 128456789012345678">
                        </div>
                    </div>
                </div>

                <button onclick="finalSave()" class="w-full bg-[#5865f2] hover:bg-[#4752c4] py-4 rounded-3xl font-black text-white uppercase tracking-widest transition-all transform active:scale-95 shadow-xl shadow-indigo-500/10">
                    Sincronizar con Zauri Bot
                </button>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
